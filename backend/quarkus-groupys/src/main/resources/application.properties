############################
# Application
############################
quarkus.application.name=groupys-backend
quarkus.http.root-path=/api
quarkus.http.host=0.0.0.0
quarkus.http.limits.max-body-size=100M
quarkus.http.limits.max-form-attribute-size=100M

############################
# Security
############################
# JWT verification configuration for protected JAX-RS resources.
# Point the public key location at a PEM file, JWK set, or JWKS endpoint.
mp.jwt.verify.issuer=${JWT_ISSUER}
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_LOCATION}
# Allow 60s clock skew between client and server (Clerk tokens are only valid for 60s)
mp.jwt.token.clock-skew=60

############################
# CORS (dev-friendly)
############################
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:8081,http://localhost:19006}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,link
quarkus.http.cors.access-control-max-age=24H
# %prod.quarkus.http.cors.origins=${APP_CORS_ORIGINS:https://what-to-wear.cms-building.at}

############################
# MinIO (quarkus-minio)
############################
# Disable Dev Services explicitly
quarkus.minio.devservices.enabled=false

# Connection
quarkus.minio.url=http://localhost:9000
quarkus.minio.region=eu-central-1
quarkus.minio.host=localhost
quarkus.minio.port=9000
quarkus.minio.secure=false
# Credentials (use env vars!)
quarkus.minio.access-key=${MINIO_ACCESS_KEY:admin}
quarkus.minio.secret-key=${MINIO_SECRET_KEY:admin123}

############################
# PostgreSQL
############################
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/db
quarkus.datasource.username=${DB_USER:app}
quarkus.datasource.password=${DB_PASS:app}

# Hibernate ORM
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.hibernate-orm.schema-management.strategy=update
%prod.quarkus.hibernate-orm.schema-management.strategy=${HIBERNATE_SCHEMA_STRATEGY:validate}

quarkus.datasource.devservices.enabled=false
%dev.quarkus.hibernate-orm.log.sql=${HIBERNATE_LOG_SQL:false}
%test.quarkus.hibernate-orm.log.sql=${HIBERNATE_LOG_SQL:false}
%prod.quarkus.http.access-log.enabled=true

############################
# Deezer REST Client
############################
quarkus.rest-client.deezer-api.url=https://api.deezer.com
quarkus.rest-client.deezer-api.scope=jakarta.inject.Singleton

############################
# Last.FM REST Client
############################
quarkus.rest-client.lastfm-api.url=https://ws.audioscrobbler.com/2.0/
quarkus.rest-client.lastfm-api.scope=jakarta.inject.Singleton
lastfm.api.key=${LASTFM_API_KEY}

############################
# Spotify REST Clients
############################
quarkus.rest-client.spotify-api.url=https://api.spotify.com
quarkus.rest-client.spotify-api.scope=jakarta.inject.Singleton
quarkus.rest-client.spotify-api.disable-default-mapper=true
quarkus.rest-client.spotify-auth.url=https://accounts.spotify.com
quarkus.rest-client.spotify-auth.scope=jakarta.inject.Singleton
spotify.client.id=${SPOTIFY_CLIENT_ID}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET}
spotify.redirect.uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:8080/api/spotify/callback}
spotify.frontend.url=${SPOTIFY_FRONTEND_URL:http://localhost:3000}

############################
# Redis
############################
quarkus.redis.hosts=${REDIS_HOSTS:redis://localhost:6379}
quarkus.redis.timeout=2S

############################
# Performance feature flags
############################
performance.redis.enabled=${PERF_REDIS_ENABLED:false}
performance.redis.recommendation.read-enabled=${PERF_REDIS_RECO_READ_ENABLED:false}
performance.redis.recommendation.write-enabled=${PERF_REDIS_RECO_WRITE_ENABLED:false}
performance.redis.recommendation.legacy-postgres-write-enabled=${PERF_REDIS_RECO_LEGACY_WRITE_ENABLED:true}
performance.redis.chat-rate-limit-enabled=${PERF_REDIS_CHAT_RATE_LIMIT_ENABLED:false}
performance.redis.unread-counters-enabled=${PERF_REDIS_UNREAD_ENABLED:false}
performance.redis.readiness.strict-enabled=${PERF_REDIS_READINESS_STRICT_ENABLED:false}

performance.schema.bootstrap-enabled=${PERF_SCHEMA_BOOTSTRAP_ENABLED:true}
performance.vector.bootstrap-enabled=${PERF_VECTOR_BOOTSTRAP_ENABLED:true}
performance.vector.read-enabled=${PERF_VECTOR_READ_ENABLED:false}
performance.vector.candidate-top-k=${PERF_VECTOR_TOP_K:500}
performance.vector.embedding-dimension=${PERF_VECTOR_DIMENSION:768}

performance.snapshot.blob.read-enabled=${PERF_SNAPSHOT_BLOB_READ_ENABLED:false}
performance.snapshot.blob.write-enabled=${PERF_SNAPSHOT_BLOB_WRITE_ENABLED:false}
performance.snapshot.payload-json-write-enabled=${PERF_SNAPSHOT_JSON_WRITE_ENABLED:true}
performance.snapshot.bucket=${PERF_SNAPSHOT_BUCKET:music-snapshots}

performance.read-model.read-enabled=${PERF_READ_MODEL_READ_ENABLED:false}
performance.read-model.write-enabled=${PERF_READ_MODEL_WRITE_ENABLED:false}
